name: work
description: Work laptop with extended context models
extends: personal
managed_tools:
  install_sources:
    ai-agent-rules: github
    statusline: github
settings_overrides:
  claude:
    model: "opus[1m]"
    remoteControlAtStartup: false
  codex:
    service_tier: "fast"
    features:
      fast_mode: true
  gemini:
    model:
      name: "gemini-3.1-pro-preview"
    security:
      auth:
        selectedType: "gemini-api-key"
agents_md_file: fragments/work.md
exclude_symlinks:
  - ~/.config/goose/config.yaml
