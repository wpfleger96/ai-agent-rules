name: personal
description: Author's personal preset (not a generic recommendation)
extends: default
agents_md_file: fragments/personal.md
settings_overrides:
  claude:
    model: opusplan
    remoteControlAtStartup: true
    permissions:
      defaultMode: bypassPermissions
  statusline:
    terminal_title:
      enabled: true
plugins:
  - name: pyright-lsp
    marketplace: claude-plugins-official
  - name: typescript-lsp
    marketplace: claude-plugins-official
  - name: rust-analyzer-lsp
    marketplace: claude-plugins-official
