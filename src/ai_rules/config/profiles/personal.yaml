name: personal
description: Personal configuration with additional tools and integrations
extends: default
settings_overrides:
  claude:
    model: opusplan
  statusline:
    terminal_title:
      enabled: true
exclude_symlinks: []
mcp_overrides:
  recall:
    type: stdio
    command: recall
    args:
      - mcp
      - stdio
    name: recall
    description: Persistent markdown knowledge base with FTS5 search and git sync
